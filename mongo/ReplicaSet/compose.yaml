services:
  mongo1:
    image: mongo:7
    restart: on-failure
    hostname: mongo1
    container_name: mongo1
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongo1:/data/db
      - ./data/mongo1_config:/data/configdb
      - ./conf/mongo-replication.key:/etc/mongo-replication.key
      - ./conf/enabled:/sys/kernel/mm/transparent_hugepage/enabled
    command: [ "--replSet", "dbrs", "--bind_ip_all", "--keyFile", "/etc/mongo-replication.key" ]
    environment: &env
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: changepassword
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'dbrs',members:[{_id:0,host:'10.182.1.15:27017'},{_id:1,host:'10.182.1.15:27018'},{_id:2,host:'10.182.1.15:27019'}]}) }" | mongosh -u $${MONGO_INITDB_ROOT_USERNAME} -p $${MONGO_INITDB_ROOT_PASSWORD}
      interval: 5s
      start_period: 8s
      start_interval: 1s
      retries: 30

  mongo2:
    image: mongo:7
    restart: on-failure
    hostname: mongo2
    container_name: mongo2
    ports:
      - "27018:27017"
    volumes:
      - ./data/mongo2:/data/db
      - ./data/mongo2_config:/data/configdb
      - ./conf/mongo-replication.key:/etc/mongo-replication.key
      - ./conf/enabled:/sys/kernel/mm/transparent_hugepage/enabled
    command: [ "--replSet", "dbrs", "--bind_ip_all", "--keyFile", "/etc/mongo-replication.key" ]
    environment:
      *env

  mongo3:
    image: mongo:7
    restart: on-failure
    hostname: mongo3
    container_name: mongo3
    ports:
      - "27019:27017"
    volumes:
      - ./data/mongo3:/data/db
      - ./data/mongo3_config:/data/configdb
      - ./conf/mongo-replication.key:/etc/mongo-replication.key
      - ./conf/enabled:/sys/kernel/mm/transparent_hugepage/enabled
    command: [ "--replSet", "dbrs", "--bind_ip_all", "--keyFile", "/etc/mongo-replication.key" ]
    environment:
      *env